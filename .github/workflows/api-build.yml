
name: API CI - Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: backend/SoccerCoach.Api
        run: dotnet restore

      - name: Build
        working-directory: backend/SoccerCoach.Api
        run: dotnet build -c Release --no-restore
